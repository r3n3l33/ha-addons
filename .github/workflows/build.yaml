name: Build and Publish eBUSd Add-on

on:
  push:
    branches:
      - main
    paths:
      - 'ebusd/**'
      - '.github/workflows/build.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64, armv7, armhf, i386]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./ebusd
          file: ./ebusd/Dockerfile
          platforms: |
            linux/${{ matrix.arch }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-addon-ebusd-${{ matrix.arch }}:latest
            ghcr.io/${{ github.repository_owner }}/ha-addon-ebusd-${{ matrix.arch }}:${{ github.sha }}
